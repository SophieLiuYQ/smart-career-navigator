version: "3.8"

services:
  neo4j:
    image: neo4j:5-community
    container_name: career-neo4j
    ports:
      - "7474:7474"  # Browser
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/careernavigator
      - NEO4J_PLUGINS=["graph-data-science"]
    volumes:
      - neo4j_data:/data

  rocketride:
    image: ghcr.io/rocketride-org/rocketride-engine:latest
    container_name: career-rocketride
    ports:
      - "5565:5565"
    volumes:
      - ./pipelines:/pipelines

volumes:
  neo4j_data:
